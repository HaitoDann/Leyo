name: Build Leyo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false        # ← désactive le cache (go.sum absent)

      - name: Télécharger les dépendances
        run: go mod tidy      # ← génère go.sum automatiquement

      - name: Compiler Leyo
        run: go build -o leyo.exe .

      - name: Uploader le binaire
        uses: actions/upload-artifact@v4
        with:
          name: leyo-windows
          path: leyo.exe