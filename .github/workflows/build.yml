name: Build Leyo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Télécharger dépendances Go
        run: go mod tidy

      - name: Build Wails
        run: wails build -o Leyo.exe

      - name: Installer NSIS
        run: choco install nsis -y --no-progress

      - name: Créer l'installeur
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsisPath build/windows/installer.nsi

      - name: Uploader le binaire
        uses: actions/upload-artifact@v4
        with:
          name: leyo-windows
          path: build/bin/Leyo.exe

      - name: Uploader l'installeur
        uses: actions/upload-artifact@v4
        with:
          name: leyo-installer
          path: build/windows/LeyoSetup.exe

      - name: Installer dépendances frontend
        run: npm install
          working-directory: frontend

      - name: Bundler CodeMirror
        run: npm run build
          working-directory: frontend