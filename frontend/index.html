<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leyo Shell</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">

    <div class="header">
      <img src="assets/logo.png" height="32" width="32" style="object-fit: contain;"/>
      <span class="logo">LEYO</span>
      <span class="version">v2.0 — Shell by VinX</span>
      <div class="tabs" id="tabs"></div>
      <button class="tab-add" id="tabAdd" title="Nouvel onglet">＋</button>
      <div class="header-diamond"></div>
    </div>

    <div class="main">

      <div class="sidebar">
        <div class="sidebar-title">Fichiers</div>
        <div class="file-list" id="fileList"></div>
      </div>

      <div class="terminal">
        <div class="output" id="output"></div>
        <div class="input-area">
          <span class="prompt-user">[VinX]</span>
          <span class="prompt-path" id="currentPath">C:\</span>
          <span class="prompt-arrow">›</span>
          <div class="input-wrapper">
            <input type="text" id="commandInput" autocomplete="off" spellcheck="false"/>
            <span class="ghost-text" id="ghostText"></span>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
